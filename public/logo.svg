<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Fork -->
  <g transform="translate(20, 10)">
    <!-- Fork handle -->
    <rect x="24" y="52" width="6" height="48" rx="3" fill="#7C9A6E"/>
    <!-- Fork tines -->
    <rect x="12" y="8" width="4" height="34" rx="2" fill="#7C9A6E"/>
    <rect x="21" y="4" width="4" height="38" rx="2" fill="#7C9A6E"/>
    <rect x="30" y="4" width="4" height="38" rx="2" fill="#7C9A6E"/>
    <rect x="39" y="8" width="4" height="34" rx="2" fill="#7C9A6E"/>
    <!-- Fork base curve -->
    <path d="M12 42 Q12 52 24 52 L30 52 Q42 52 42 42" stroke="#7C9A6E" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Spoon -->
  <g transform="translate(60, 10)">
    <!-- Spoon handle -->
    <rect x="14" y="52" width="6" height="48" rx="3" fill="#E8836B"/>
    <!-- Spoon bowl -->
    <ellipse cx="17" cy="22" rx="16" ry="20" fill="#E8836B"/>
    <ellipse cx="17" cy="20" rx="11" ry="14" fill="#FFFAF5"/>
  </g>

  <!-- Text: The Breslin -->
  <text x="110" y="45" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="#8B8178" letter-spacing="3">THE BRESLIN</text>

  <!-- Text: Fork & Spoon -->
  <text x="110" y="85" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="#2D2D2D">Fork <tspan fill="#7C9A6E">&amp;</tspan> <tspan fill="#E8836B">Spoon</tspan></text>
</svg>
